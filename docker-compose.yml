services:
  # ---------------------------------------------------------------------------
  # APPLICATION
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    networks:
      - secure-net

  # ---------------------------------------------------------------------------
  # NVIDIA OpenClaw + NeMo-Claw
  # Install separately on the host: curl -fsSL https://nvidia.com/nemoclaw.sh | bash
  # Then: nemoclaw onboard
  # The OpenClaw daemon exposes a local API on port 8765
  # ---------------------------------------------------------------------------
  openclaw-proxy:
    image: nginx:alpine
    # Proxy to the host-installed nemoclaw daemon
    ports:
      - "8765:80"
    volumes:
      - ./infra/nginx/openclaw-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - secure-net

  # ---------------------------------------------------------------------------
  # INFERENCE — vLLM
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:v0.6.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-nvidia/Nemotron-Mini-4B-Instruct}
      --port 8000
      --api-key ${VLLM_API_KEY:-token-secure-5678}
      --gpu-memory-utilization 0.85
    ports:
      - "8000:8000"
    volumes:
      - vllm-models:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - secure-net

  # ---------------------------------------------------------------------------
  # VECTOR DATABASE — Milvus (standalone) or Qdrant
  # ---------------------------------------------------------------------------
  milvus-standalone:
    image: milvusdb/milvus:v2.5.0
    command: ["milvus", "run", "standalone"]
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"    # Milvus metrics
    volumes:
      - milvus-data:/var/lib/milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
    depends_on:
      - etcd
    restart: unless-stopped
    networks:
      - secure-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd-data:/etcd
    command: >
      etcd --advertise-client-urls=http://127.0.0.1:2379
           --listen-client-urls http://0.0.0.0:2379
           --data-dir /etcd
    restart: unless-stopped
    networks:
      - secure-net

  # ---------------------------------------------------------------------------
  # DATABASE — PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secure_operator_db}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - secure-net

  # ---------------------------------------------------------------------------
  # OBSERVABILITY — OTel Collector
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped
    networks:
      - secure-net

volumes:
  vllm-models:
  milvus-data:
  etcd-data:
  postgres-data:

networks:
  secure-net:
    driver: bridge
